version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: securepass-db
    restart: always
    environment:
      - POSTGRES_DB=securepass_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: securepass-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@securepass.ai
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
